<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credencial Responsive</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:#f2f4f8;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* TARJETA */
.credencial{
    width:100%;
    max-width:900px;
    aspect-ratio: 16 / 9;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

/* IZQUIERDA */
.lado-izq{
    flex:1;
    background:linear-gradient(180deg,#0c1d45,#1e4ea1);
    color:#fff;
    padding:30px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
}

.foto{
    width:150px;
    height:150px;
    border-radius:12px;
    overflow:hidden;
    background:#ccc;
}

.foto img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.nombre{
    text-align:center;
}

.nombre h1{
    font-size:clamp(18px,2vw,28px);
    letter-spacing:1px;
    margin-top:20px;
}

.nombre p{
    font-size:clamp(14px,1.5vw,18px);
    opacity:0.9;
}

.barra{
    width:100%;
    height:50px;
    background:repeating-linear-gradient(
        90deg,
        #000,
        #000 3px,
        #fff 3px,
        #fff 6px
    );
    border-radius:6px;
}

/* DERECHA */
.lado-der{
    flex:1;
    padding:30px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.header{
    text-align:right;
}

.header h2{
    font-size:clamp(18px,2vw,24px);
}

.header p{
    font-size:clamp(12px,1.2vw,14px);
    color:#666;
}

.datos{
    margin-top:20px;
}

.dato{
    margin-bottom:20px;
}

.dato span{
    display:block;
    font-size:12px;
    color:#777;
}

.dato strong{
    font-size:clamp(16px,1.8vw,20px);
}

.footer{
    text-align:right;
    font-size:12px;
    color:#aaa;
}

/* 📱 MOBILE */
@media(max-width:768px){

    .credencial{
        flex-direction:column;
        aspect-ratio:auto;
        max-width:400px;
    }

    .lado-izq{
        padding:20px;
    }

    .lado-der{
        padding:20px;
    }

    .header{
        text-align:left;
    }

    .footer{
        text-align:left;
    }
}

</style>
</head>
<body>

<div class="credencial">

    <div class="lado-izq">
        <div class="foto">
            <img src="https://via.placeholder.com/300" alt="Foto">
        </div>

        <div class="nombre">
            <h1>DANTE ALEJANDRO ARAOZ</h1>
            <p>Matrícula Profesional Abogado</p>
        </div>

        <div class="barra"></div>
    </div>

    <div class="lado-der">
        <div class="header">
            <h2>COLEGIO DE ABOGADOS</h2>
            <p>Congreso 450, San Miguel de Tucumán</p>
            <p>Tucumán</p>
        </div>

        <div class="datos">
            <div class="dato">
                <span>CÓDIGO</span>
                <strong>35740</strong>
            </div>

            <div class="dato">
                <span>FECHA DE NACIMIENTO</span>
                <strong>14-07-1979</strong>
            </div>

            <div class="dato">
                <span>VENCIMIENTO</span>
                <strong>15-07-2031</strong>
            </div>
        </div>

        <div class="footer">
            Registro Institucional de DAS
        </div>
    </div>

</div>

</body>
</html>
