<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credencial</title>

<style>
body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family: Arial, Helvetica, sans-serif;
}

.credencial{
    width:850px;
    height:500px;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* LADO IZQUIERDO */
.lado-izq{
    width:50%;
    background:linear-gradient(180deg,#0d1b3d,#123a7a);
    color:#fff;
    padding:40px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
}

.foto{
    width:180px;
    height:180px;
    background:#ccc;
    border-radius:10px;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
}

.foto img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.nombre{
    text-align:center;
}

.nombre h1{
    margin:20px 0 5px 0;
    font-size:28px;
    letter-spacing:2px;
}

.nombre p{
    margin:0;
    font-size:18px;
}

.barra{
    width:100%;
    height:60px;
    background:repeating-linear-gradient(
        90deg,
        #000,
        #000 3px,
        #fff 3px,
        #fff 6px
    );
    border-radius:6px;
}

/* LADO DERECHO */
.lado-der{
    width:50%;
    padding:40px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.header{
    text-align:right;
}

.header h2{
    margin:0;
    font-size:24px;
}

.header p{
    margin:5px 0;
    font-size:14px;
}

.datos{
    margin-top:30px;
}

.dato{
    margin-bottom:20px;
}

.dato span{
    display:block;
    font-size:12px;
    color:#777;
}

.dato strong{
    font-size:18px;
}

.footer{
    text-align:right;
    font-size:14px;
    color:#999;
}

/* RESPONSIVE */
@media(max-width:900px){
    .credencial{
        width:95%;
        height:auto;
        flex-direction:column;
    }

    .lado-izq, .lado-der{
        width:100%;
    }
}
</style>
</head>

<body>

<div class="credencial">

    <div class="lado-izq">
        <div class="foto">
            <!-- Reemplazar por foto real -->
            <img src="https://via.placeholder.com/180" alt="Foto">
        </div>

        <div class="nombre">
            <h1>NOMBRE APELLIDO</h1>
            <p>Cargo / Matrícula</p>
        </div>

        <div class="barra"></div>
    </div>

    <div class="lado-der">
        <div class="header">
            <h2>NOMBRE INSTITUCIÓN</h2>
            <p>Dirección institucional</p>
            <p>Ciudad - Provincia</p>
        </div>

        <div class="datos">
            <div class="dato">
                <span>CÓDIGO</span>
                <strong>00000001</strong>
            </div>

            <div class="dato">
                <span>FECHA DE NACIMIENTO</span>
                <strong>01-01-1990</strong>
            </div>

            <div class="dato">
                <span>VENCIMIENTO</span>
                <strong>01-01-2028</strong>
            </div>
        </div>

        <div class="footer">
            Registro Institucional
        </div>
    </div>

</div>

</body>
</html>
