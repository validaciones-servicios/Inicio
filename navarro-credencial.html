<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credencial Responsive</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:#f2f4f8;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* BOTÓN */
.boton-pdf{
    margin-bottom:20px;
}

.boton-pdf button{
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:#1e4ea1;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

/* TARJETA */
.credencial{
    width:100%;
    max-width:900px;
    aspect-ratio: 16 / 9;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

/* IZQUIERDA */
.lado-izq{
    flex:1;
    background:linear-gradient(180deg,#0c1d45,#1e4ea1);
    color:#fff;
    padding:30px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
}

.foto{
    width:150px;
    height:150px;
    border-radius:12px;
    overflow:hidden;
    background:#ccc;
}

.foto img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.nombre{
    text-align:center;
}

.nombre h1{
    font-size:clamp(18px,2vw,28px);
    letter-spacing:1px;
    margin-top:20px;
}

.nombre p{
    font-size:clamp(14px,1.5vw,18px);
    opacity:0.9;
}

.barra{
    width:100%;
    height:50px;
    background:repeating-linear-gradient(
        90deg,
        #000,
        #000 3px,
        #fff 3px,
        #fff 6px
    );
    border-radius:6px;
}

/* DERECHA */
.lado-der{
    flex:1;
    padding:30px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.header{
    text-align:left;
}

.header h2{
    font-size:clamp(18px,2vw,24px);
}

.header p{
    font-size:clamp(12px,1.2vw,14px);
    color:#666;
}

.datos{
    margin-top:20px;
}

.dato{
    margin-bottom:20px;
}

.dato span{
    display:block;
    font-size:12px;
    color:#777;
}

.dato strong{
    font-size:clamp(16px,1.8vw,20px);
}

.footer{
    text-align:center;
    font-size:12px;
    color:#aaa;
}

/* 📱 MOBILE */
@media(max-width:768px){
    .credencial{
        flex-direction:column;
        aspect-ratio:auto;
        max-width:400px;
    }
}

</style>
</head>
<body>

<div class="boton-pdf">
    <button onclick="descargarPDF()">Descargar Credencial en PDF</button>
</div>

<div class="credencial" id="credencial">

    <div class="lado-izq">
        <div class="foto">
            <img src="https://i.postimg.cc/XXT81vWh/IMG-20260301-WA0064.jpg" crossorigin="anonymous">
        </div>

        <div class="nombre">
            <h1>MAURICIO LUIS NAVARRO</h1>
            <p>Credencial Instructor Funcional (Personal Trainer)</p>
        </div>

        <div class="barra"></div>
    </div>

    <div class="lado-der">
        <div class="header">
            <h2>CENTRO ACADÉMICO DE ENTRENAMIENTO FÍSICO</h2>
            <p>Colón 802, Buenos Aires</p>
            <p>Provincia de Buenos Aires</p>
        </div>

        <div class="datos">
            <div class="dato">
                <span>MATRÍCULA N°</span>
                <strong>M.N 578091</strong>
            </div>

            <div class="dato">
                <span>FECHA DE NACIMIENTO</span>
                <strong>13-12-1981</strong>
            </div>

            <div class="dato">
                <span>VENCIMIENTO</span>
                <strong>14-12-2027</strong>
            </div>
        </div>

        <div class="footer">
            Certificación otorgada por "CAEF"
        </div>
    </div>

</div>

<!-- Librería -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
function descargarPDF(){
    const elemento = document.getElementById("credencial");

    const ancho = elemento.offsetWidth;
    const alto = elemento.offsetHeight;

    html2pdf().set({
        margin: 0,
        filename: 'credencial.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { 
            scale: 3,
            useCORS: true
        },
        jsPDF: {
            unit: 'px',
            format: [ancho, alto],
            orientation: ancho > alto ? 'landscape' : 'portrait'
        }
    }).from(elemento).save();
}
</script>

</body>
</html>
